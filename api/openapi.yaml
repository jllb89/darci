      x-roles:
        - admin
        - service_role
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /audit-events:
    get:
      summary: List audit events (guidance)
      description: Guidance-only endpoint to shape future audit log retrieval.
      x-roles:
        - admin
        - service_role
      x-experimental: true
      parameters:
        - in: query
          name: documentId
          schema:
            type: string
        - in: query
          name: signatureId
          schema:
            type: string
        - in: query
          name: action
          schema:
            type: string
        - in: query
          name: actorId
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            format: int32
            default: 50
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEventListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /verify/{idn}:
    get:
      summary: Verify document authenticity
      security: []
      parameters:
        - in: path
          name: idn
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Document:
      type: object
      properties:
        id:
          type: string
        idn:
          type: string
          nullable: true
        status:
          type: string
        documentType:
          type: string
        jurisdiction:
          type: string
        createdAt:
          type: string
          format: date-time
    DocumentVersion:
      type: object
      properties:
        id:
          type: string
        version:
          type: integer
        storagePath:
          type: string
        fileName:
          type: string
        mimeType:
          type: string
        sizeBytes:
          type: integer
          format: int64
        isFinal:
          type: boolean
        createdAt:
          type: string
          format: date-time
    SignatureField:
      type: object
      properties:
        id:
          type: string
        pageNumber:
          type: integer
        x:
          type: number
        y:
          type: number
        width:
          type: number
        height:
          type: number
        required:
          type: boolean
    TimelineEvent:
      type: object
      properties:
        action:
          type: string
        timestamp:
          type: string
          format: date-time
        actorId:
          type: string
    NotaryContext:
      type: object
      properties:
        requestId:
          type: string
        documentId:
          type: string
        jurisdiction:
          type: string
        idRequirements:
          type: string
        acknowledgmentTemplate:
          type: string
        appearanceType:
          type: string
          description: Appearance model for notarization (e.g., ipen).
        venueRequired:
          type: boolean
        consentRequired:
          type: boolean
        meetingId:
          type: string
          nullable: true
        meetingStatus:
          type: string
        meetingScheduledAt:
          type: string
          format: date-time
          nullable: true
        meetingTimezone:
          type: string
          nullable: true
        meetingLocation:
          type: string
          nullable: true
    DocumentListResponse:
      type: object
      properties:
        documents:
          type: array
          items:
            $ref: "#/components/schemas/Document"
    DashboardResponse:
      type: object
      properties:
        documents:
          type: array
          items:
            $ref: "#/components/schemas/Document"
        activity:
          type: array
          items:
            $ref: "#/components/schemas/DashboardActivity"
        counts:
          $ref: "#/components/schemas/DashboardCounts"
    NotaryDashboardResponse:
      type: object
      properties:
        requests:
          type: array
          items:
            $ref: "#/components/schemas/NotarizationRequest"
        meetings:
          type: array
          items:
            $ref: "#/components/schemas/Meeting"
        activity:
          type: array
          items:
            $ref: "#/components/schemas/DashboardActivity"
        counts:
          $ref: "#/components/schemas/NotaryDashboardCounts"
    DashboardActivity:
      type: object
      properties:
        action:
          type: string
        timestamp:
          type: string
          format: date-time
        documentId:
          type: string
          nullable: true
        entityType:
          type: string
        entityId:
          type: string
          nullable: true
    DashboardCounts:
      type: object
      properties:
        draft:
          type: integer
        pendingSignature:
          type: integer
        pendingNotary:
          type: integer
        completed:
          type: integer
        total:
          type: integer
    NotaryDashboardCounts:
      type: object
      properties:
        pending:
          type: integer
        scheduled:
          type: integer
        completed:
          type: integer
        total:
          type: integer
    DocumentDetailResponse:
      type: object
      properties:
        document:
          $ref: "#/components/schemas/Document"
    DocumentCreateResponse:
      type: object
      properties:
        document:
          $ref: "#/components/schemas/Document"
        version:
          $ref: "#/components/schemas/DocumentVersion"
        upload:
          $ref: "#/components/schemas/UploadSession"
    DocumentUploadFinalizeResponse:
      type: object
      properties:
        document:
          $ref: "#/components/schemas/Document"
        version:
          $ref: "#/components/schemas/DocumentVersion"
    DocumentVersionsResponse:
      type: object
      properties:
        versions:
          type: array
          items:
            $ref: "#/components/schemas/DocumentVersion"
    DocumentTimelineResponse:
      type: object
      properties:
        timeline:
          type: array
          items:
            $ref: "#/components/schemas/TimelineEvent"
    SignatureFieldsResponse:
      type: object
      properties:
        fields:
          type: array
          items:
            $ref: "#/components/schemas/SignatureField"
    UploadSession:
      type: object
      properties:
        bucket:
          type: string
        path:
          type: string
        signedUrl:
          type: string
        token:
          type: string
    SignatureResponse:
      type: object
      properties:
        status:
          type: string
        message:
          type: string
        signatureId:
          type: string
    SignatureUploadResponse:
      type: object
      properties:
        signature:
          $ref: "#/components/schemas/SignatureUpload"
        upload:
          $ref: "#/components/schemas/UploadSession"
    SignatureFinalizeResponse:
      type: object
      properties:
        signature:
          $ref: "#/components/schemas/SignatureUpload"
    SignatureUpload:
      type: object
      properties:
        id:
          type: string
        documentId:
          type: string
        storagePath:
          type: string
        status:
          type: string
    NotarizationSubmitResponse:
      type: object
      properties:
        request:
          $ref: "#/components/schemas/NotarizationRequest"
        document:
          $ref: "#/components/schemas/NotarizationDocument"
        code:
          $ref: "#/components/schemas/NotarizationCode"
    NotarizationDocument:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
    NotarizationRequest:
      type: object
      properties:
        id:
          type: string
        documentId:
          type: string
        status:
          type: string
        submittedAt:
          type: string
          format: date-time
        meetingId:
          type: string
          nullable: true
        meetingStatus:
          type: string
        meetingScheduledAt:
          type: string
          format: date-time
          nullable: true
        meetingTimezone:
          type: string
          nullable: true
        meetingLocation:
          type: string
          nullable: true
    NotarizationRequestListResponse:
      type: object
      properties:
        requests:
          type: array
          items:
            $ref: "#/components/schemas/NotarizationRequest"
    NotarizationRequestDetailResponse:
      type: object
      properties:
        request:
          $ref: "#/components/schemas/NotarizationRequest"
        document:
          $ref: "#/components/schemas/NotarizationDocument"
        meeting:
          $ref: "#/components/schemas/Meeting"
    RequestTimelineResponse:
      type: object
      properties:
        timeline:
          type: array
          items:
            $ref: "#/components/schemas/TimelineEvent"
    MeetingResponse:
      type: object
      properties:
        meeting:
          $ref: "#/components/schemas/Meeting"
    Meeting:
      type: object
      properties:
        meetingId:
          type: string
        requestId:
          type: string
        scheduledAt:
          type: string
          format: date-time
          nullable: true
        timezone:
          type: string
        location:
          type: string
          nullable: true
        status:
          type: string
    MeetingProposalRequest:
      type: object
      required:
        - proposedSlots
        - timezone
      properties:
        proposedSlots:
          type: array
          items:
            type: string
            format: date-time
        timezone:
          type: string
        location:
          type: string
    MeetingConfirmRequest:
      type: object
      required:
        - scheduledAt
        - timezone
      properties:
        scheduledAt:
          type: string
          format: date-time
        timezone:
          type: string
        location:
          type: string
    MeetingRescheduleRequest:
      type: object
      required:
        - scheduledAt
        - timezone
      properties:
        scheduledAt:
          type: string
          format: date-time
        timezone:
          type: string
        location:
          type: string
        rescheduleReason:
          type: string
    MeetingCancelRequest:
      type: object
      required:
        - cancelledBy
      properties:
        cancelledBy:
          type: string
          enum:
            - member
            - notary
            - system
        cancellationReason:
          type: string
    MeetingNoShowRequest:
      type: object
      required:
        - noShowParty
      properties:
        noShowParty:
          type: string
          enum:
            - member
            - notary
    NotarizationCode:
      type: object
      properties:
        id:
          type: string
        code:
          type: string
        status:
          type: string
        expiresAt:
          type: string
          format: date-time
    NotaryCodeResolveResponse:
      type: object
      properties:
        request:
          type: object
          properties:
            id:
              type: string
            documentId:
              type: string
            status:
              type: string
        code:
          $ref: "#/components/schemas/NotarizationCode"
    AuditEvent:
      type: object
      properties:
        id:
          type: string
        actorId:
          type: string
        entityType:
          type: string
        entityId:
          type: string
          nullable: true
        action:
          type: string
        metadata:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
    AuditEventListResponse:
      type: object
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/AuditEvent"
    CodeResponse:
      type: object
      properties:
        code:
          type: string
        status:
          type: string
        expiresAt:
          type: string
          format: date-time
    NotaryContextResponse:
      type: object
      properties:
        context:
          $ref: "#/components/schemas/NotaryContext"
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        role:
          type: string
          enum:
            - member
            - notary
            - admin
        status:
          type: string
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
    SignupRequest:
      type: object
      required:
        - firstName
        - lastName
        - email
        - password
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
          nullable: true
        refreshToken:
          type: string
          nullable: true
        user:
          $ref: "#/components/schemas/User"
    UserResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
    PoaRequirementResponse:
      type: object
      properties:
        requirement:
          $ref: "#/components/schemas/PoaRequirement"
    PoaRequirement:
      type: object
      properties:
        id:
          type: string
        jurisdiction:
          type: string
        poaType:
          type: string
          enum:
            - general
            - limited
            - durable
            - medical
            - vehicle
            - tax
            - springing
            - other
        uiProfile:
          type: string
          enum:
            - standard
            - notary_only
            - witness_only
            - notary_or_witness
            - notary_and_witness
            - review_required
        reviewStatus:
          type: string
          enum:
            - draft
            - reviewed
            - approved
            - needs_review
            - deprecated
        reviewedAt:
          type: string
          format: date-time
          nullable: true
        requirements:
          $ref: "#/components/schemas/PoaRequirementDecisionSet"
        legalText:
          $ref: "#/components/schemas/PoaRequirementLegalText"
        source:
          $ref: "#/components/schemas/PoaRequirementSource"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    PoaRequirementDecisionSet:
      type: object
      properties:
        notarizationRule:
          type: string
          enum:
            - required
            - optional
            - alternative_to_witnesses
            - not_required
            - varies_by_type
            - not_addressed
        witnessRule:
          type: string
          enum:
            - none
            - required
            - optional
            - alternative_to_notary
            - additional_to_notary
            - varies_by_type
            - not_addressed
        witnessCount:
          type: integer
          nullable: true
        durabilityRule:
          type: string
          enum:
            - conditional
            - requires_explicit_language
            - presumed_durable
            - not_durable_unless_stated
            - varies_by_type
            - not_addressed
        statutoryFormRule:
          type: string
          enum:
            - available
            - not_available
            - multiple_forms
            - not_addressed
        effectiveDateRule:
          type: string
          enum:
            - upon_execution
            - upon_execution_unless_specified
            - upon_triggering_event
            - varies_by_type
            - not_addressed
        competencyRule:
          type: string
          enum:
            - general_capacity_required
            - contract_capacity_required
            - sound_mind_required
            - understand_nature_and_effect
            - sufficient_mental_capacity
            - not_addressed
        specialAuthorityRule:
          type: string
          enum:
            - required_for_certain_acts
            - not_required
            - varies_by_type
            - not_addressed
        allowsAgentCertification:
          type: boolean
        requiresPrincipalSignature:
          type: boolean
        allowsProxySignature:
          type: boolean
        requiresAcknowledgmentCertificate:
          type: boolean
    PoaRequirementLegalText:
      type: object
      properties:
        governingLaw:
          type: string
          nullable: true
        executionRequirements:
          type: string
          nullable: true
        acknowledgmentWitnessing:
          type: string
          nullable: true
        durability:
          type: string
          nullable: true
        specialAuthority:
          type: string
          nullable: true
        competency:
          type: string
          nullable: true
        statutoryForm:
          type: string
          nullable: true
        effectiveDate:
          type: string
          nullable: true
    PoaRequirementSource:
      type: object
      properties:
        citation:
          type: string
          nullable: true
        url:
          type: string
          format: uri
          nullable: true
        notes:
          type: string
          nullable: true
    ApiResponse:
      type: object
      properties:
        status:
          type: string
        message:
          type: string
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
    VerificationResponse:
      type: object
      properties:
        idn:
          type: string
        hash:
          type: string
        ledgerTxId:
          type: string
        anchoredAt:
          type: string
          format: date-time
        status:
          type: string
