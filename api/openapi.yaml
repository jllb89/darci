openapi: 3.0.3
info:
  title: DARCI Notarization API
  version: 0.1.0
servers:
  - url: "{apiBaseUrl}"
    description: Base URL for local, staging, or production.
    variables:
      apiBaseUrl:
        default: https://api.example.com
security:
  - bearerAuth: []
paths:
  /auth/login:
    post:
      summary: Login
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /users/me:
    get:
      summary: Current user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /dashboard/member:
    get:
      summary: Member dashboard
      x-roles:
        - member
        - admin
        - service_role
      parameters:
        - in: query
          name: memberId
          schema:
            type: string
          description: Internal member user id (admin/service_role only).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /admin/users/{id}/role:
    patch:
      summary: Update user role
      description: Updates role for a Supabase Auth user id and the internal users table.
      x-roles:
        - admin
        - service_role
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Supabase Auth user id (JWT sub).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - role
              properties:
                role:
                  type: string
                  enum:
                    - member
                    - notary
                    - admin
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /documents:
    post:
      summary: Create document
      x-roles:
        - member
        - notary
        - admin
        - service_role
      x-audit-events:
        - member.document_upload_started
        - system.document_created
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - fileName
                - fileSize
                - mimeType
              properties:
                title:
                  type: string
                templateId:
                  type: string
                documentType:
                  type: string
                jurisdiction:
                  type: string
                fileName:
                  type: string
                fileSize:
                  type: integer
                  format: int64
                mimeType:
                  type: string
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentCreateResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      summary: List documents
      x-roles:
        - member
        - notary
        - admin
        - service_role
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /documents/{id}:
    get:
      summary: Get document
      x-roles:
        - member
        - notary
        - admin
        - service_role
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentDetailResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /documents/{id}/versions:
    get:
      summary: List document versions
      x-roles:
        - member
        - notary
        - admin
        - service_role
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentVersionsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /documents/{id}/timeline:
    get:
      summary: Get document status timeline
      x-roles:
        - member
        - notary
        - admin
        - service_role
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentTimelineResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /documents/{id}/signature-fields:
    get:
      summary: Get signature fields
      x-roles:
        - member
        - notary
        - admin
        - service_role
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignatureFieldsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /documents/{id}/signatures/request:
    post:
      summary: Request member signature upload
      x-roles:
        - member
        - admin
        - service_role
      x-audit-events:
        - member.signature_capture_started
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - fileSize
                - mimeType
              properties:
                fileName:
                  type: string
                fileSize:
                  type: integer
                  format: int64
                mimeType:
                  type: string
                  enum:
                    - image/png
                    - image/svg+xml
                    - image/jpeg
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignatureUploadResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /documents/{id}/signatures/finalize:
    post:
      summary: Finalize member signature upload
      x-roles:
        - member
        - admin
        - service_role
      x-audit-events:
        - member.signature_capture_completed
        - system.signature_linked_to_document
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - signatureId
              properties:
                signatureId:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignatureFinalizeResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /documents/{id}/sign:
    post:
      summary: Sign document
      x-roles:
        - member
        - admin
        - service_role
      x-audit-events:
        - member.signature_capture_started
        - member.signature_capture_completed
        - system.signature_linked_to_document
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                signatureMethod:
                  type: string
                  description: draw|upload|typed
                deviceType:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignatureResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /documents/{id}/upload-finalize:
    post:
      summary: Finalize document upload
      x-roles:
        - member
        - admin
        - service_role
      x-audit-events:
        - member.document_upload_completed
        - system.document_idn_assigned
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - documentVersionId
              properties:
                documentVersionId:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentUploadFinalizeResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /documents/{id}/submit-notarization:
    post:
      summary: Submit for notarization
      x-roles:
        - member
        - admin
        - service_role
      x-audit-events:
        - member.notarization_submit_started
        - member.notarization_submitted
        - system.code_generated
        - system.code_delivered
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                webhookUrl:
                  type: string
                  format: uri
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotarizationSubmitResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /documents/{id}/append-acknowledgment:
    post:
      summary: Append acknowledgment
      x-roles:
        - notary
        - admin
        - service_role
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /documents/{id}/watermark:
    post:
      summary: Watermark document
      x-roles:
        - notary
        - admin
        - service_role
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /notary/code/resolve:
    post:
      summary: Resolve code
      x-roles:
        - notary
        - admin
        - service_role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotaryCodeResolveResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /notary/code/resend:
    post:
      summary: Resend code
      x-roles:
        - notary
        - admin
        - service_role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                requestId:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CodeResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /notary/code/regenerate:
    post:
      summary: Regenerate code
      x-roles:
        - notary
        - admin
        - service_role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                requestId:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CodeResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /notary/requests/{id}/context:
    get:
      summary: Notary context panel data
      x-roles:
        - notary
        - admin
        - service_role
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotaryContextResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /notary/requests/{id}/sign:
    post:
      summary: Notary sign
      x-roles:
        - notary
        - admin
        - service_role
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /notary/requests/{id}/submit:
    post:
      summary: Submit notarized document
      x-roles:
        - notary
        - admin
        - service_role
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /ledger/anchor:
    post:
      summary: Anchor ledger entry
      x-roles:
        - admin
        - service_role
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /audit-events:
    get:
      summary: List audit events (guidance)
      description: Guidance-only endpoint to shape future audit log retrieval.
      x-roles:
        - admin
        - service_role
      x-experimental: true
      parameters:
        - in: query
          name: documentId
          schema:
            type: string
        - in: query
          name: signatureId
          schema:
            type: string
        - in: query
          name: action
          schema:
            type: string
        - in: query
          name: actorId
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            format: int32
            default: 50
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEventListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /verify/{idn}:
    get:
      summary: Verify document authenticity
      security: []
      parameters:
        - in: path
          name: idn
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Document:
      type: object
      properties:
        id:
          type: string
        idn:
          type: string
          nullable: true
        status:
          type: string
        documentType:
          type: string
        jurisdiction:
          type: string
        createdAt:
          type: string
          format: date-time
    DocumentVersion:
      type: object
      properties:
        id:
          type: string
        version:
          type: integer
        storagePath:
          type: string
        fileName:
          type: string
        mimeType:
          type: string
        sizeBytes:
          type: integer
          format: int64
        isFinal:
          type: boolean
        createdAt:
          type: string
          format: date-time
    SignatureField:
      type: object
      properties:
        id:
          type: string
        pageNumber:
          type: integer
        x:
          type: number
        y:
          type: number
        width:
          type: number
        height:
          type: number
        required:
          type: boolean
    TimelineEvent:
      type: object
      properties:
        action:
          type: string
        timestamp:
          type: string
          format: date-time
        actorId:
          type: string
    NotaryContext:
      type: object
      properties:
        requestId:
          type: string
        documentId:
          type: string
        jurisdiction:
          type: string
        idRequirements:
          type: string
        acknowledgmentTemplate:
          type: string
        appearanceType:
          type: string
          description: Appearance model for notarization (e.g., ipen).
        venueRequired:
          type: boolean
        consentRequired:
          type: boolean
    DocumentListResponse:
      type: object
      properties:
        documents:
          type: array
          items:
            $ref: "#/components/schemas/Document"
    DashboardResponse:
      type: object
      properties:
        documents:
          type: array
          items:
            $ref: "#/components/schemas/Document"
        activity:
          type: array
          items:
            $ref: "#/components/schemas/DashboardActivity"
        counts:
          $ref: "#/components/schemas/DashboardCounts"
    DashboardActivity:
      type: object
      properties:
        action:
          type: string
        timestamp:
          type: string
          format: date-time
        documentId:
          type: string
          nullable: true
        entityType:
          type: string
        entityId:
          type: string
          nullable: true
    DashboardCounts:
      type: object
      properties:
        draft:
          type: integer
        pendingSignature:
          type: integer
        pendingNotary:
          type: integer
        completed:
          type: integer
        total:
          type: integer
    DocumentDetailResponse:
      type: object
      properties:
        document:
          $ref: "#/components/schemas/Document"
    DocumentCreateResponse:
      type: object
      properties:
        document:
          $ref: "#/components/schemas/Document"
        version:
          $ref: "#/components/schemas/DocumentVersion"
        upload:
          $ref: "#/components/schemas/UploadSession"
    DocumentUploadFinalizeResponse:
      type: object
      properties:
        document:
          $ref: "#/components/schemas/Document"
        version:
          $ref: "#/components/schemas/DocumentVersion"
    DocumentVersionsResponse:
      type: object
      properties:
        versions:
          type: array
          items:
            $ref: "#/components/schemas/DocumentVersion"
    DocumentTimelineResponse:
      type: object
      properties:
        timeline:
          type: array
          items:
            $ref: "#/components/schemas/TimelineEvent"
    SignatureFieldsResponse:
      type: object
      properties:
        fields:
          type: array
          items:
            $ref: "#/components/schemas/SignatureField"
    UploadSession:
      type: object
      properties:
        bucket:
          type: string
        path:
          type: string
        signedUrl:
          type: string
        token:
          type: string
    SignatureResponse:
      type: object
      properties:
        status:
          type: string
        message:
          type: string
        signatureId:
          type: string
    SignatureUploadResponse:
      type: object
      properties:
        signature:
          $ref: "#/components/schemas/SignatureUpload"
        upload:
          $ref: "#/components/schemas/UploadSession"
    SignatureFinalizeResponse:
      type: object
      properties:
        signature:
          $ref: "#/components/schemas/SignatureUpload"
    SignatureUpload:
      type: object
      properties:
        id:
          type: string
        documentId:
          type: string
        storagePath:
          type: string
